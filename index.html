<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GB Level Crossings</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }
    #map { width: 100vw; height: 100vh; }

    .legend {
      background: white;
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.3);
      font-size: 12px;
      line-height: 1.8;
    }
    .legend h4 { margin-bottom: 6px; font-size: 13px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }

    .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 6px; }
    .popup-table { font-size: 12px; width: 100%; border-collapse: collapse; }
    .popup-table td { padding: 2px 4px; }
    .popup-table td:first-child { color: #666; white-space: nowrap; }
    .risk-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
      color: white;
    }
    .protection-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 6px 10px;
      background: #FF9800;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }
    .protection-btn:hover { background: #e65100; }
    .protection-box {
      margin-top: 8px;
      padding: 8px;
      background: #fff8e1;
      border-radius: 5px;
      font-size: 12px;
    }
    .protection-section { margin-bottom: 6px; }
    .protection-section ul { margin: 4px 0 0 16px; }
    .protection-section li { margin-bottom: 2px; }
    .streetview-btn {
      display: block;
      margin-top: 10px;
      padding: 6px 10px;
      background: #4285F4;
      color: white;
      text-align: center;
      border-radius: 5px;
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
    }
    .streetview-btn:hover { background: #3367d6; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script>
    const RISK_COLOURS = {
      "Extremely high": "#8B0000",
      "Very high":      "#D32F2F",
      "High":           "#F44336",
      "Above average":  "#FF9800",
      "Average":        "#FFC107",
      "Below average":  "#8BC34A",
      "Low":            "#4CAF50",
      "Very low":       "#2E7D32",
      "Extremely low":  "#1B5E20",
    };

    function getColour(label) {
      return RISK_COLOURS[label] || "#9E9E9E";
    }

    function makeIcon(colour) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
        <circle cx="9" cy="9" r="8" fill="${colour}" stroke="white" stroke-width="2"/>
      </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -10]
      });
    }

    const map = L.map('map').setView([54.5, -2.5], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    const CROSSING_DESCRIPTIONS = {
      "UWCT":      "User Worked Crossing with Telephone — the user must phone the signaller for permission before crossing",
      "FPS":       "Footpath Crossing with Stiles — a footpath crossing protected by stiles on each side",
      "FPW":       "Footpath Crossing with Wicket Gates — a footpath crossing with small swing gates",
      "CCTV":      "CCTV Monitored Crossing — monitored remotely by a signaller via CCTV cameras",
      "AHB":       "Automatic Half Barrier Crossing — barriers lower automatically when a train approaches",
      "UWC":       "User Worked Crossing — the user operates the gates or barriers themselves",
      "FPK":       "Footpath Crossing with Kissing Gate — a footpath crossing with a round kissing gate",
      "FPWM":      "Footpath Crossing with Wicket Gates and Miniature Stop Lights — has traffic lights for pedestrians",
      "UWCMSL":    "User Worked Crossing with Miniature Stop Lights — the user operates the crossing but has miniature signal lights to warn of approaching trains",
      "MCBOD":     "Manually Controlled Barriers with Obstacle Detection — a manned barrier crossing that can detect vehicles trapped on the crossing",
      "MCB/MB":    "Manually Controlled Barriers — barriers operated by a signaller or crossing keeper",
      "FPG":       "Footpath Crossing with Gates — a simple footpath crossing with full gates",
      "AHB-X":     "Automatic Half Barrier Crossing with CCTV — automatic barriers also monitored by CCTV",
      "FPGT":      "Footpath Crossing with Gates and Telephone — footpath crossing with gates and a phone to call the signaller",
      "MGH":       "Manually Gated Halt — a manually operated gated crossing at a halt or station",
      "FPGM":      "Footpath Crossing with Gates and Miniature Stop Lights — has full gates and miniature warning lights",
      "ABCL":      "Automatic Barrier Crossing Locally Monitored — automatic barriers monitored locally rather than by a remote signaller",
      "AOCLB":     "Automatic Open Crossing Locally Monitored with Barriers — an open crossing with automatic barriers, monitored locally",
      "UWCM":      "User Worked Crossing with Miniature Stop Lights — like a UWC but with miniature signal lights",
      "SPC":       "Summoned Presence Crossing — a crossing where a trained person must be present to supervise",
      "FPV":       "Footpath Crossing with Vegetation Screen — a footpath crossing where vegetation reduces sightlines",
      "OC":        "Open Crossing — a crossing with no barriers or gates; trains have priority",
      "SBC":       "Swing Bridge Crossing — a crossing on a swing bridge over water",
      "FPSM":      "Footpath Crossing with Stiles and Miniature Stop Lights — stiled footpath crossing with warning lights",
      "AOCL":      "Automatic Open Crossing Locally Monitored — an open crossing monitored locally with automatic warnings",
      "FPOM":      "Footpath Crossing Open with Miniature Stop Lights — an open footpath crossing with miniature signal lights",
      "UWWM":      "User Worked Wicket Gate with Miniature Stop Lights",
      "FPO":       "Footpath Open Crossing — an open footpath crossing with no gates or barriers",
      "TMOB":      "Temporary Minimum Open Barrier — a temporary crossing arrangement using minimal barriers",
      "MGW":       "Manually Gated Crossing with Wicket Gate",
      "MCBR":      "Manually Controlled Barriers with Radio — barriers operated by a signaller communicating via radio",
      "TMOG":      "Temporary Minimum Open Gate — a temporary crossing using minimum gating",
      "TOG":       "Temporary Open Gate crossing",
      "WG":        "Wicket Gate crossing — a simple crossing with small swing gates",
      "UWW":       "User Worked Wicket Gate — the user opens and closes the wicket gate themselves",
      "SMWL":      "Swing Bridge with Miniature Warning Lights",
      "MG":        "Manually Gated Crossing — gates operated by hand",
      "WAG":       "Weighted Automatic Gate — gates that return automatically to the closed position",
      "TOB":       "Temporary Open Barrier crossing",
    };

    const clusters = L.markerClusterGroup({ maxClusterRadius: 40 });

    fetch('level_crossings_merged.json')
      .then(r => r.json())
      .then(data => {
        data.forEach(c => {
          if (!c.lat || !c.lng) return;

          const colour = getColour(c.individual_risk_label);
          const marker = L.marker([c.lat, c.lng], { icon: makeIcon(colour) });

          const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${c.lat},${c.lng}`;

          const typeLabel = c.crossing_type || 'level';
          const typeExplain = CROSSING_DESCRIPTIONS[c.crossing_type] || `a ${typeLabel} type level crossing`;
          const routeDesc = c.route ? ` on the ${c.route} route` : '';
          const regionDesc = c.region ? ` in the ${c.region} region` : '';
          const statusDesc = c.status ? ` It is currently <strong>${c.status.toLowerCase()}</strong>.` : '';
          const locationDesc = c.elr ? ` It sits at ${c.miles} miles and ${c.chains} chains along the ${c.elr} line.` : '';
          const typeFullDesc = ` This type of crossing (${typeLabel}) means: ${typeExplain}.`;
          const riskDesc = c.individual_risk_label ? ` The crossing has been assessed as <strong>${c.individual_risk_label}</strong> individual risk and <strong>${c.collective_risk_label || 'unknown'}</strong> collective risk.` : '';
          const assessDesc = c.assessment_date ? ` It was last assessed on ${c.assessment_date}, with the next assessment due by ${c.next_due_date || 'unknown'}.` : '';
          const description = `${c.name} is a ${typeLabel} level crossing${routeDesc}${regionDesc}.${statusDesc}${locationDesc}${typeFullDesc}${riskDesc}${assessDesc}`;

          const popup = `
            <div class="popup-title">${c.name}</div>
            <p style="font-size:12px;color:#444;margin-bottom:8px;line-height:1.5">${description}</p>
            <table class="popup-table">
              <tr><td>Type</td><td>${c.crossing_type || '&mdash;'}</td></tr>
              <tr><td>Status</td><td>${c.status || '&mdash;'}</td></tr>
              <tr><td>Route</td><td>${c.route || '&mdash;'}</td></tr>
              <tr><td>Region</td><td>${c.region || '&mdash;'}</td></tr>
              <tr><td>Risk</td><td><span class="risk-badge" style="background:${colour}">${c.individual_risk_label || '&mdash;'}</span></td></tr>
              <tr><td>Collective risk</td><td>${c.collective_risk_label || '&mdash;'}</td></tr>
              <tr><td>Assessed</td><td>${c.assessment_date || '&mdash;'}</td></tr>
              <tr><td>Next due</td><td>${c.next_due_date || '&mdash;'}</td></tr>
            </table>
            ${c.protection_arrangements && c.protection_arrangements.length ? `
            <button class="protection-btn" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">
              &#128274; Show Protection Info
            </button>
            <div class="protection-box" style="display:none">
              ${c.key_risks && c.key_risks.length ? `<div class="protection-section"><strong>&#9888;&#65039; Key Risks</strong><ul>${c.key_risks.map(r => `<li>${r}</li>`).join('')}</ul></div>` : ''}
              <div class="protection-section"><strong>&#128737;&#65039; Protection Arrangements</strong><ul>${c.protection_arrangements.map(p => `<li>${p}</li>`).join('')}</ul></div>
              ${c.line_speed ? `<div class="protection-section"><strong>&#128646; Line Speed:</strong> ${c.line_speed}</div>` : ''}
              ${c.trains_per_day ? `<div class="protection-section"><strong>&#128643; Trains per Day:</strong> ${c.trains_per_day}</div>` : ''}
            </div>` : ''}
            <a class="streetview-btn" href="${svUrl}" target="_blank">&#128247; Open in Street View</a>
          `;

          marker.bindPopup(popup, { maxWidth: 280 });
          clusters.addLayer(marker);
        });

        map.addLayer(clusters);
      });

    // Legend
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = '<h4>Individual Risk</h4>' +
        Object.entries(RISK_COLOURS).map(([label, colour]) =>
          `<div class="legend-item"><span class="legend-dot" style="background:${colour}"></span>${label}</div>`
        ).join('');
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
